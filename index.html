<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
        body{
            background: #ff0000;  /* fallback for old browsers */
background: -webkit-linear-gradient(to right, #fdcf58, #ff0000);  /* Chrome 10-25, Safari 5.1-6 */
background: linear-gradient(to right, #fdcf58, #ff0000); /* W3C, IE 10+/ Edge, Firefox 16+, Chrome 26+, Opera 12+, Safari 7+ */

        }
        .parent{
            background-color: rgba(255,255,255,0.1);
            backdrop-filter: blur(1px);
            box-shadow: 0px 2px 30px;
            width: 30%;
            margin: auto;
            border-radius: 10px;
            padding: 20px 30px;
            text-align: center;
            font-family: sans-serif;

        }
        parent p{
            margin: 10px 0px;
        }
        .form-field input{
            background-color: inherit;
            padding: 10px;
            width: 60%;
            border-radius: 10px;
        }
        .form-field input::placeholder{
            color: white;
        }
        .form-field button{
            background-color: rgb(4, 71, 55);
            color: white;
            width: 80%;
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    
    <form  class="parent" action="./login.html" align="center">
        <h1 align="center">Registration Form</h1>
        
        <p class="form-field">
            <label for="name"><b>Name:</b></label>
            <input type="text" placeholder="enter your name" name="Name" id="name" required/>
         </p>   
        
        <p class="form-field">
            <label for="email"><b>Email:</b></label>
            <input type="email" placeholder="enter your email" name="Email" id="email" required />
        </p>
        <p class="form-field">
            <label for="password"><b>Password:</b></label>
            <input type="password" placeholder="enter your password" name="Password" id="password" required />
        </p>
        <p class="form-field">
            <label for="mobile number"><b>Mobile Number:</b></label>
            <input type="mobile number" placeholder="enter your mobile number" name="Mobile Number" id="mobile number" placeholder="___________" />
        </p>
        <p class="form-field">
            <label for="address"><b>Address:</b></label>
            <input type="textarea" placeholder="enter your address"  name="address" id="address">
        </p>
        <p class="form-radio">
            <label for="gender"><b>Gender:</b></label>
            <input type="radio" name="gender" id="male" value="male">
            <label for="male">Male</label>

            <input type="radio" name="gender" id="female" value="female">
            <label for="female">Female</label>
        </p>
        <p class="form-field">
            <label for="picture"><b>Picture:</b></label>
            <input type="file">
        </p>
        <p class="form-field">
            <label for="city"><b>City:</b></label>
            <select name="city" id="city">
                <option value="">select your city</option>
                <option value="hyd">Hyderabad</option>
                <option value="nzb">Nizamabad</option>
                <option value="abd">Adilabad</option>
            </select>
        </p>
        <p class="form-checkbox">
            <label for="study"><b>Education:</b></label>
            <input type="checkbox" value="10th">10th
            <input type="checkbox" value="inter">inter
            <input type="checkbox" value="diploma">diploma
            <input type="checkbox" name="btech" id="btech"> 
            <label for="btech">btech</label>          
        </p>
        <p class="form-field">
            <button>Register</button>
        </p>
    </form>
</body>

</html>
